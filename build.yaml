targets:
  $default:
    builders:
      # Drift code generation
      drift_dev:
        options:
          store_date_time_values_as_text: false
          named_parameters: true
          #eager_loading: false

      # Riverpod generator
      riverpod_generator:
        options:
          riverpod_version: 2

      # Freezed
      freezed:
        generate_for:
          include:
            - lib/features/**/domain/*.dart
