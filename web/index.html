<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <!-- Primary Meta -->
  <title>WordProgressor</title>
  <meta name="description" content="Verwalte deine kreativen Schreibprojekte – mit Fortschritt, Meilensteinen und Deadlines.">
  <meta name="theme-color" content="#C2410C">
  <meta name="color-scheme" content="light dark">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Preconnect for Firebase (loaded lazily) -->
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>

  <!-- Flutter bootstrap -->
  <script>
    engineInitializer.initializeEnginge({multiViewEnabled: true})
  </script>

  <style>
    /* Prevent flash of unstyled content during Flutter init */
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: #FFFBF7; /* matches AppTheme light surface */
    }

    @media (prefers-color-scheme: dark) {
      html, body {
        background-color: #1C1A16; /* matches AppTheme dark surface */
      }
    }

    /* Loading spinner shown before Flutter draws its first frame */
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 20px;
      font-family: system-ui, sans-serif;
      color: #C2410C;
    }

    #loading .logo {
      font-size: 48px;
    }

    #loading .label {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.05em;
      opacity: 0.7;
      color: inherit;
    }

    #loading .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(194, 65, 12, 0.15);
      border-top-color: #C2410C;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <!-- Shown until Flutter renders its first frame -->
  <div id="loading">
    <div class="logo">✍️</div>
    <div class="label">WordProgressor</div>
    <div class="spinner"></div>
  </div>

  <!-- Flutter Web Bootstrap -->
  <script src="flutter_bootstrap.js" async></script>

  <script>
    window.addEventListener('flutter-first-frame', () => {
      const loading = document.getElementById('loading');
      if (loading) {
        loading.style.transition = 'opacity 0.3s ease';
        loading.style.opacity = '0';
        setTimeout(() => loading.remove(), 300);
      }
    });
  </script>

</body>
</html>
