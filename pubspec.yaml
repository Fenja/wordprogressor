name: wordprogressor
description: A creative writing project manager with offline support and cloud sync.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Local Database — drift_flutter handles native + web (IndexedDB/WASM)
  drift: ^2.18.0
  drift_flutter: ^0.2.1
  path_provider: ^2.1.3
  path: ^1.9.0

  # Firebase — all packages support web
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1

  # Social Sign-In
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.1
  crypto: ^3.0.3              # for Apple nonce hashing

  # Navigation
  go_router: ^14.2.0

  # Notifications — native on mobile, Web Notification API on web
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

  # Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Utils
  uuid: ^4.4.2
  intl: ^0.20.2
  equatable: ^2.0.5
  connectivity_plus: ^6.0.3
  shared_preferences: ^2.3.1

  # UI
  fl_chart: ^0.68.0
  flutter_slidable: ^3.1.1
  gap: ^3.0.1
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  drift_dev: ^2.18.0
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true
  generate: true
  assets:
    #- assets/fonts/
    #- assets/web/